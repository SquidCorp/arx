info:
  name: "5.2 Lifecycle - read created post"
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/posts/{{lifecyclePostId}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("lifecycle: should read the created post", function() {
          expect(res.status).to.equal(200);
          expect(res.body.id).to.equal(bru.getVar("lifecyclePostId"));
          expect(res.body.title).to.equal("Lifecycle Test Post");
          expect(res.body.body).to.equal("Created during lifecycle test.");
          expect(res.body.authorId).to.equal("a1b2c3d4-e5f6-7890-abcd-ef1234567890");
        });
