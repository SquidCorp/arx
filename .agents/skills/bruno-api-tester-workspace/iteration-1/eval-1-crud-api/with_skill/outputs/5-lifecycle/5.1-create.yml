info:
  name: "5.1 Lifecycle - create post"
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/posts"
  body:
    type: json
    data: |-
      {
        "title": "Lifecycle Test Post",
        "body": "Created during lifecycle test.",
        "authorId": "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("lifecycle: should create post", function() {
          expect(res.status).to.equal(201);
          expect(res.body).to.have.property("id");
        });
        bru.setVar("lifecyclePostId", res.body.id);
