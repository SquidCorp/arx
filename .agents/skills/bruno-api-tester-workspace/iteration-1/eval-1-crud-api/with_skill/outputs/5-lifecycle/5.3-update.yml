info:
  name: "5.3 Lifecycle - update post"
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/posts/{{lifecyclePostId}}"
  body:
    type: json
    data: |-
      {
        "title": "Lifecycle Updated Title",
        "body": "Updated during lifecycle test.",
        "authorId": "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("lifecycle: should update post", function() {
          expect(res.status).to.equal(200);
          expect(res.body.title).to.equal("Lifecycle Updated Title");
          expect(res.body.body).to.equal("Updated during lifecycle test.");
        });
