info:
  name: "5.4 Lifecycle - verify update via GET"
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/posts/{{lifecyclePostId}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("lifecycle: GET should reflect updated values", function() {
          expect(res.status).to.equal(200);
          expect(res.body.title).to.equal("Lifecycle Updated Title");
          expect(res.body.body).to.equal("Updated during lifecycle test.");
        });
