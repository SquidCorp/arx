info:
  name: "2.1 Read post - happy path"
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/posts/{{readPostId}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200 OK", function() {
          expect(res.status).to.equal(200);
        });

        test("should return the correct post", function() {
          expect(res.body).to.have.property("id");
          expect(res.body.id).to.equal(bru.getVar("readPostId"));
        });

        test("should have all expected fields", function() {
          expect(res.body).to.have.property("title");
          expect(res.body).to.have.property("body");
          expect(res.body).to.have.property("authorId");
          expect(res.body).to.have.property("createdAt");
          expect(res.body).to.have.property("updatedAt");
        });

        test("should have correct field types", function() {
          expect(res.body.title).to.be.a("string");
          expect(res.body.body).to.be.a("string");
          expect(res.body.authorId).to.match(/^[0-9a-f-]{36}$/);
          expect(res.body.createdAt).to.be.a("string");
          expect(res.body.updatedAt).to.be.a("string");
        });
