version: "1"
name: Update Post - Missing Title
type: http
seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/posts/{{postId}}"
  headers:
    Content-Type: application/json
    Authorization: "Bearer {{apiToken}}"
  body:
    type: json
    content: |
      {
        "body": "Body without a title.",
        "authorId": "{{authorId}}"
      }

assertions:
  - type: status
    value: 400
  - type: jsonpath
    expression: $.error
    operator: isDefined
