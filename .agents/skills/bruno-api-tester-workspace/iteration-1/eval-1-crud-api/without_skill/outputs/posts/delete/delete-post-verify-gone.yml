version: "1"
name: Delete Post - Verify Deleted Post Returns 404
type: http
seq: 3

http:
  method: GET
  url: "{{baseUrl}}/posts/{{postId}}"
  headers:
    Authorization: "Bearer {{apiToken}}"

assertions:
  - type: status
    value: 404
  - type: jsonpath
    expression: $.error
    operator: isDefined
