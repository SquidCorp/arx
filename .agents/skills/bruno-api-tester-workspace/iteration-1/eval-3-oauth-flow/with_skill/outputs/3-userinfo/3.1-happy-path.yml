info:
  name: "3.1 Userinfo - happy path"
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/oauth/userinfo"

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.status).to.equal(200);
        });

        test("should return user id", function() {
          expect(res.body).to.have.property("id");
          expect(res.body.id).to.be.a("string");
        });

        test("should return user email", function() {
          expect(res.body).to.have.property("email");
          expect(res.body.email).to.be.a("string");
          expect(res.body.email).to.include("@");
        });

        test("should return user name", function() {
          expect(res.body).to.have.property("name");
          expect(res.body.name).to.be.a("string");
          expect(res.body.name.length).to.be.greaterThan(0);
        });
