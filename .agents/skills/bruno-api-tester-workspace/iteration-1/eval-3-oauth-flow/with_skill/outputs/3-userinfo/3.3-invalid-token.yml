info:
  name: "3.3 Userinfo - invalid token"
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/oauth/userinfo"

runtime:
  scripts:
    - type: before-request
      code: |-
        // Override folder-level auth with a bogus token.
        req.setHeader('Authorization', 'Bearer invalid-token-value');
    - type: tests
      code: |-
        test("should return 401 for invalid token", function() {
          expect(res.status).to.equal(401);
        });

        test("should include an error description", function() {
          expect(res.body).to.have.property("error");
        });
