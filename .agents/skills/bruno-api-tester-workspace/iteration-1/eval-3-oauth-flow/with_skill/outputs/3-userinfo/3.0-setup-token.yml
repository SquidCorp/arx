info:
  name: "3.0 Setup - obtain access token"
  type: http
  seq: 0

http:
  method: POST
  url: "{{baseUrl}}/oauth/authorize"
  body:
    type: json
    data: |-
      {
        "client_id": "{{clientId}}",
        "redirect_uri": "http://localhost:3000/callback",
        "scope": "openid profile email",
        "state": "e2e-userinfo-setup"
      }

runtime:
  scripts:
    - type: before-request
      code: |-
        // Override folder auth — this request does not need a Bearer token.
        req.setHeader('Content-Type', 'application/json');
    - type: tests
      code: |-
        test("setup: should obtain authorization code", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.have.property("code");
        });

        bru.setVar("setupAuthCode", res.body.code);

        // Now exchange the code for tokens via a programmatic request.
        const tokenRes = await bru.sendRequest({
          method: "POST",
          url: bru.interpolate("{{baseUrl}}") + "/oauth/token",
          headers: { "Content-Type": "application/json" },
          data: {
            grant_type: "authorization_code",
            code: res.body.code,
            client_id: bru.interpolate("{{clientId}}"),
            client_secret: bru.interpolate("{{clientSecret}}")
          }
        });

        bru.setVar("accessToken", tokenRes.data.access_token);
        bru.setVar("refreshToken", tokenRes.data.refresh_token);
