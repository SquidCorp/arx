info:
  name: "4.2 Revoke - verify revoked token is rejected"
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/oauth/userinfo"

runtime:
  scripts:
    - type: before-request
      code: |-
        // Use the token that was just revoked in 4.1.
        const revokedToken = bru.getVar('revokeAccessToken');
        req.setHeader('Authorization', 'Bearer ' + revokedToken);
    - type: tests
      code: |-
        test("should return 401 for revoked token", function() {
          expect(res.status).to.equal(401);
        });

        test("should include an error description", function() {
          expect(res.body).to.have.property("error");
        });
