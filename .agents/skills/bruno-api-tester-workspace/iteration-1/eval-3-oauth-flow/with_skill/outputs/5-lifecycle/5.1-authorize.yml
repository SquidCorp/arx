info:
  name: "5.1 Lifecycle - authorize"
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/oauth/authorize"
  body:
    type: json
    data: |-
      {
        "client_id": "{{clientId}}",
        "redirect_uri": "http://localhost:3000/callback",
        "scope": "openid profile email",
        "state": "e2e-lifecycle"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("lifecycle: should obtain authorization code", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.have.property("code");
          expect(res.body.code).to.be.a("string");
        });

        test("lifecycle: should echo state", function() {
          expect(res.body.state).to.equal("e2e-lifecycle");
        });

        bru.setVar("lcAuthCode", res.body.code);
