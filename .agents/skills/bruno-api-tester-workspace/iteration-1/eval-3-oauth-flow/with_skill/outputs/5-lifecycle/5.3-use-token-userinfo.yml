info:
  name: "5.3 Lifecycle - use token to get userinfo"
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/oauth/userinfo"

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getVar('lcAccessToken');
        req.setHeader('Authorization', 'Bearer ' + token);
    - type: tests
      code: |-
        test("lifecycle: should return 200 with valid token", function() {
          expect(res.status).to.equal(200);
        });

        test("lifecycle: should return user profile", function() {
          expect(res.body).to.have.property("id");
          expect(res.body).to.have.property("email");
          expect(res.body).to.have.property("name");
          expect(res.body.id).to.be.a("string");
          expect(res.body.email).to.be.a("string");
          expect(res.body.name).to.be.a("string");
        });

        // Store user id for potential downstream verification
        bru.setVar("lcUserId", res.body.id);
