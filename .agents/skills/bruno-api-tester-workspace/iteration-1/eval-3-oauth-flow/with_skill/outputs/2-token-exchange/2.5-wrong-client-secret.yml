info:
  name: "2.5 Token exchange - wrong client_secret"
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/oauth/token"
  body:
    type: json
    data: |-
      {
        "grant_type": "authorization_code",
        "code": "{{authCode}}",
        "client_id": "{{clientId}}",
        "client_secret": "wrong-secret-value"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 401 for wrong client_secret", function() {
          expect(res.status).to.be.oneOf([400, 401]);
        });

        test("should include an error description", function() {
          expect(res.body).to.have.property("error");
        });
