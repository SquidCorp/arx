info:
  name: "2.3 Token exchange - missing client_secret"
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/oauth/token"
  body:
    type: json
    data: |-
      {
        "grant_type": "authorization_code",
        "code": "{{authCode}}",
        "client_id": "{{clientId}}"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 400 or 401 for missing client_secret", function() {
          expect(res.status).to.be.oneOf([400, 401]);
        });

        test("should include an error description", function() {
          expect(res.body).to.have.property("error");
        });
