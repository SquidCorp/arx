info:
  name: "1.3 Authorize - missing redirect_uri"
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/oauth/authorize"
  body:
    type: json
    data: |-
      {
        "client_id": "{{clientId}}",
        "scope": "openid profile email",
        "state": "e2e-authorize-state-3"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 400 for missing redirect_uri", function() {
          expect(res.status).to.equal(400);
        });

        test("should include an error description", function() {
          expect(res.body).to.have.property("error");
        });
