meta:
  name: Payment Refunded
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/webhooks/payment"
  body: json
  auth: none

headers:
  Content-Type: application/json
  X-Webhook-Signature: "{{hmacSignature}}"

body:
  json: |
    {
      "id": "evt_payment_refunded_001",
      "type": "payment.refunded",
      "data": {
        "payment_id": "pay_345mno",
        "amount": 2500,
        "currency": "usd",
        "customer_id": "cus_678pqr",
        "refund_reason": "customer_request"
      },
      "created_at": "2026-04-24T12:02:00Z"
    }

script:
  pre-request: |
    const crypto = require('crypto');
    const body = JSON.stringify({
      "id": "evt_payment_refunded_001",
      "type": "payment.refunded",
      "data": {
        "payment_id": "pay_345mno",
        "amount": 2500,
        "currency": "usd",
        "customer_id": "cus_678pqr",
        "refund_reason": "customer_request"
      },
      "created_at": "2026-04-24T12:02:00Z"
    });
    const secret = bru.getEnvVar("webhookSecret");
    const signature = crypto.createHmac('sha256', secret).update(body).digest('hex');
    bru.setVar("hmacSignature", signature);

tests: |
  test("should return 200", () => {
    expect(res.getStatus()).to.equal(200);
  });

  test("should return processed true", () => {
    const body = res.getBody();
    expect(body.processed).to.equal(true);
  });

  test("should return action credit", () => {
    const body = res.getBody();
    expect(body.action).to.equal("credit");
  });
