meta:
  name: Payment Failed
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/webhooks/payment"
  body: json
  auth: none

headers:
  Content-Type: application/json
  X-Webhook-Signature: "{{hmacSignature}}"

body:
  json: |
    {
      "id": "evt_payment_failed_001",
      "type": "payment.failed",
      "data": {
        "payment_id": "pay_789ghi",
        "amount": 3000,
        "currency": "usd",
        "customer_id": "cus_012jkl",
        "failure_reason": "insufficient_funds"
      },
      "created_at": "2026-04-24T12:01:00Z"
    }

script:
  pre-request: |
    const crypto = require('crypto');
    const body = JSON.stringify({
      "id": "evt_payment_failed_001",
      "type": "payment.failed",
      "data": {
        "payment_id": "pay_789ghi",
        "amount": 3000,
        "currency": "usd",
        "customer_id": "cus_012jkl",
        "failure_reason": "insufficient_funds"
      },
      "created_at": "2026-04-24T12:01:00Z"
    });
    const secret = bru.getEnvVar("webhookSecret");
    const signature = crypto.createHmac('sha256', secret).update(body).digest('hex');
    bru.setVar("hmacSignature", signature);

tests: |
  test("should return 200", () => {
    expect(res.getStatus()).to.equal(200);
  });

  test("should return processed true", () => {
    const body = res.getBody();
    expect(body.processed).to.equal(true);
  });

  test("should return action notify", () => {
    const body = res.getBody();
    expect(body.action).to.equal("notify");
  });
