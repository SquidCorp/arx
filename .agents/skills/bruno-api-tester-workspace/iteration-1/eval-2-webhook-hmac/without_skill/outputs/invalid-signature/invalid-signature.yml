    {
      "id": "evt_bad_sig_001",
      "type": "payment.completed",
      "data": {
        "payment_id": "pay_badsig",
        "amount": 1500,
        "currency": "usd",
        "customer_id": "cus_badsig"
      },
      "created_at": "2026-04-24T12:04:00Z"
    }

tests: |
  test("should return 401 for invalid signature", () => {
    expect(res.getStatus()).to.equal(401);
  });
