meta:
  name: Payment Completed
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/webhooks/payment"
  body: json
  auth: none

headers:
  Content-Type: application/json
  X-Webhook-Signature: "{{hmacSignature}}"

body:
  json: |
    {
      "id": "evt_payment_completed_001",
      "type": "payment.completed",
      "data": {
        "payment_id": "pay_123abc",
        "amount": 5000,
        "currency": "usd",
        "customer_id": "cus_456def"
      },
      "created_at": "2026-04-24T12:00:00Z"
    }

script:
  pre-request: |
    const crypto = require('crypto');
    const body = JSON.stringify({
      "id": "evt_payment_completed_001",
      "type": "payment.completed",
      "data": {
        "payment_id": "pay_123abc",
        "amount": 5000,
        "currency": "usd",
        "customer_id": "cus_456def"
      },
      "created_at": "2026-04-24T12:00:00Z"
    });
    const secret = bru.getEnvVar("webhookSecret");
    const signature = crypto.createHmac('sha256', secret).update(body).digest('hex');
    bru.setVar("hmacSignature", signature);

tests: |
  test("should return 200", () => {
    expect(res.getStatus()).to.equal(200);
  });

  test("should return processed true", () => {
    const body = res.getBody();
    expect(body.processed).to.equal(true);
  });

  test("should not include action field", () => {
    const body = res.getBody();
    expect(body.action).to.be.undefined;
  });
