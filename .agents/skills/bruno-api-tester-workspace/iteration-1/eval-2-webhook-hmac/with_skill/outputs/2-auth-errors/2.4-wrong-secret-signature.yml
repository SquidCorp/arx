info:
  name: "2.4 Signature computed with wrong secret"
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/webhooks/payment"
  body:
    type: json
    data: |-
      {
        "id": "evt_wrongsecret_001",
        "type": "payment.completed",
        "data": {
          "payment_id": "pay_wrongsecret",
          "amount": 1000,
          "currency": "usd"
        }
      }

runtime:
  scripts:
    - type: before-request
      code: |-
        const crypto = require('node:crypto');
        const wrongSecret = 'this-is-not-the-correct-secret';
        const body = req.getBody() ? JSON.stringify(req.getBody()) : '';
        const signature = crypto.createHmac('sha256', wrongSecret)
          .update(body)
          .digest('hex');
        req.setHeader('X-Webhook-Signature', signature);
    - type: tests
      code: |-
        test("should return 401 when signature uses wrong secret", function() {
          expect(res.status).to.equal(401);
        });
