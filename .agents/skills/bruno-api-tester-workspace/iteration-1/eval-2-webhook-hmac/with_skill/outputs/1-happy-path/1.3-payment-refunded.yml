info:
  name: "1.3 Payment refunded event"
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/webhooks/payment"
  body:
    type: json
    data: |-
      {
        "id": "evt_refunded_001",
        "type": "payment.refunded",
        "data": {
          "payment_id": "pay_ghi789",
          "amount": 1500,
          "currency": "usd",
          "refund_reason": "customer_request"
        }
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.status).to.equal(200);
        });

        test("should confirm event was processed", function() {
          expect(res.body).to.have.property("processed");
          expect(res.body.processed).to.equal(true);
        });

        test("should include credit action for refunded payments", function() {
          expect(res.body).to.have.property("action");
          expect(res.body.action).to.equal("credit");
        });
