info:
  name: "1.1 Payment completed event"
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/webhooks/payment"
  body:
    type: json
    data: |-
      {
        "id": "evt_completed_001",
        "type": "payment.completed",
        "data": {
          "payment_id": "pay_abc123",
          "amount": 4999,
          "currency": "usd"
        }
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.status).to.equal(200);
        });

        test("should confirm event was processed", function() {
          expect(res.body).to.have.property("processed");
          expect(res.body.processed).to.equal(true);
        });

        test("should not include an action for completed events", function() {
          expect(res.body).to.not.have.property("action");
        });
