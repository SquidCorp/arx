info:
  name: "4.4 Expiry capped by tenant max"
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/webhook/session-refresh"
  body:
    type: json
    data: |-
      {"sessionId":"{{refreshSessionId}}","expiresIn":7200}

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200 (expiry capped to 1h internally)", function() {
          expect(res.status).to.equal(200);
        });

        test("should return status: refreshed", function() {
          expect(res.body.status).to.equal("refreshed");
        });
