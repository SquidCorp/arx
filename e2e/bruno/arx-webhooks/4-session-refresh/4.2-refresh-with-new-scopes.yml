info:
  name: "4.2 Refresh with new scopes"
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/webhook/session-refresh"
  body:
    type: json
    data: |-
      {"sessionId":"{{refreshSessionId}}","expiresIn":1800,"scopes":["cart.view","cart.edit","checkout"]}

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.status).to.equal(200);
        });

        test("should return status: refreshed", function() {
          expect(res.body.status).to.equal("refreshed");
        });
