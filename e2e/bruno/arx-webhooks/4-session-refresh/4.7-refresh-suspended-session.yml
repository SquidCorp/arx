info:
  name: "4.7 Refresh suspended session"
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/webhook/session-refresh"
  body:
    type: json
    data: |-
      {"sessionId":"{{suspendedSessionId}}","expiresIn":1800}

runtime:
  scripts:
    - type: before-request
      code: |-
        // Requires a suspended session. Set via SQL:
        //   UPDATE sessions SET status = 'suspended' WHERE id = '<session_id>';

    - type: tests
      code: |-
        test("should return 409", function() {
          expect(res.status).to.equal(409);
        });

        test("should return session_not_active error", function() {
          expect(res.body.error).to.equal("session_not_active");
        });
