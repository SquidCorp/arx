info:
  name: "0.2 Fixture — create expired session"
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/internal/test/sessions"
  body:
    type: json
    data: |-
      {"tenantId":"{{TENANT_ID}}","status":"expired","scopes":["cart.view"],"expiresIn":3600}

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          bru.setVar("expiredSessionId", res.body.sessionId);
        }
    - type: tests
      code: |-
        test("fixture: should create expired session", function() {
          expect(res.status).to.equal(201);
        });
