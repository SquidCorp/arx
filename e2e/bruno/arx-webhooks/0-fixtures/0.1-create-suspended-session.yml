info:
  name: "0.1 Fixture — create suspended session"
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/internal/test/sessions"
  body:
    type: json
    data: |-
      {"tenantId":"{{TENANT_ID}}","status":"suspended","scopes":["cart.view"],"expiresIn":3600}

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          bru.setVar("suspendedSessionId", res.body.sessionId);
        }
    - type: tests
      code: |-
        test("fixture: should create suspended session", function() {
          expect(res.status).to.equal(201);
        });
