info:
  name: "5.0 Setup — create session for revoke tests"
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/webhook/session-connected"
  body:
    type: json
    data: |-
      {"sessionId":"e2e-revoke-session","scopes":["cart.view"],"expiresIn":3600}

runtime:
  scripts:
    - type: tests
      code: |-
        test("setup: should create session", function() {
          expect(res.status).to.equal(201);
        });

        bru.setVar("revokeSessionId", res.body.sessionId);
