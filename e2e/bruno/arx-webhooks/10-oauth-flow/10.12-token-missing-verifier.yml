info:
  name: "10.12 Token — missing code_verifier"
  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}/oauth/token"
  body:
    type: form-urlencoded
    data: |-
      grant_type=authorization_code&code=fake-code

runtime:
  scripts:
    - type: before-request
      code: |-
        req.setHeader('Content-Type', 'application/x-www-form-urlencoded');
    - type: tests
      code: |-
        test("should return 400", function() {
          expect(res.status).to.equal(400);
        });

        test("should return missing_code_verifier error", function() {
          expect(res.body.error).to.equal("missing_code_verifier");
        });
