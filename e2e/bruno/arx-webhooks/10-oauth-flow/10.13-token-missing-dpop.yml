info:
  name: "10.13 Token — missing DPoP proof"
  type: http
  seq: 13

http:
  method: POST
  url: "{{baseUrl}}/oauth/token"
  body:
    type: form-urlencoded
    data: |-
      grant_type=authorization_code&code=fake-code&code_verifier=fake-verifier

runtime:
  scripts:
    - type: before-request
      code: |-
        req.setHeader('Content-Type', 'application/x-www-form-urlencoded');
    - type: tests
      code: |-
        test("should return 400", function() {
          expect(res.status).to.equal(400);
        });

        test("should return missing_dpop_proof error", function() {
          expect(res.body.error).to.equal("missing_dpop_proof");
        });
