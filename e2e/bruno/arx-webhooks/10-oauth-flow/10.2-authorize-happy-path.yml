info:
  name: "10.2 Authorize happy path — redirect to merchant login"
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/.well-known/oauth-authorization-server"

runtime:
  scripts:
    - type: before-request
      code: |-
        const crypto = require('node:crypto');

        // Generate PKCE pair.
        const verifier = crypto.randomBytes(32).toString('base64url');
        const challenge = crypto.createHash('sha256').update(verifier).digest('base64url');

        const baseUrl = bru.getEnvVar('baseUrl');
        const tenantId = bru.getEnvVar('TENANT_ID');
        const redirectUri = bru.getEnvVar('OAUTH_REDIRECT_URI');

        const params = new URLSearchParams({
          client_id: tenantId,
          redirect_uri: redirectUri,
          state: 'e2e-state-10.2',
          code_challenge: challenge,
          code_challenge_method: 'S256'
        });

        const authUrl = `${baseUrl}/oauth/authorize?${params.toString()}`;
        const resp = await fetch(authUrl, { redirect: 'manual' });

        // Store results for assertion in tests block.
        bru.setVar('authorizeStatus', resp.status);
        const location = resp.headers.get('location') || '';
        bru.setVar('authorizeLocation', location);

    - type: tests
      code: |-
        test("authorize should return 302 Found", function() {
          const status = bru.getVar('authorizeStatus');
          expect(status).to.equal(302);
        });

        test("should redirect to merchant login URL", function() {
          const location = bru.getVar('authorizeLocation');
          const merchantLogin = bru.getEnvVar('MERCHANT_LOGIN_URL');
          expect(location).to.include(merchantLogin);
        });

        test("redirect should contain agent_session_uuid", function() {
          const location = bru.getVar('authorizeLocation');
          expect(location).to.include('agent_session_uuid=');
        });
