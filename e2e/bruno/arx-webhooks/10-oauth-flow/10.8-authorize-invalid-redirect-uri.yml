info:
  name: "10.8 Authorize — invalid redirect_uri"
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/oauth/authorize?client_id={{tenantId}}&redirect_uri=https://evil.example.com/steal&state=x&code_challenge=x&code_challenge_method=S256"

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 400", function() {
          expect(res.status).to.equal(400);
        });

        test("should return invalid_redirect_uri error", function() {
          expect(res.body.error).to.equal("invalid_redirect_uri");
        });
