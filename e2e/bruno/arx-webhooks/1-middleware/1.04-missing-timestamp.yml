info:
  name: "1.04 Missing X-Arx-Timestamp"
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/webhook/session-connected"
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Arx-Tenant-ID
      value: "{{tenantId}}"
    - name: X-Arx-Signature
      value: "dGVzdC1zaWduYXR1cmU="
  body:
    type: json
    data: |-
      {"sessionId":"mw-test-4","scopes":["cart.view"],"expiresIn":3600}

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 401", function() {
          expect(res.status).to.equal(401);
        });

        test("should return missing_timestamp error", function() {
          expect(res.body.error).to.equal("missing_timestamp");
        });
