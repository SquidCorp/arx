info:
  name: "1.03 Missing X-Arx-Signature"
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/webhook/session-connected"
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Arx-Tenant-ID
      value: "{{tenantId}}"
  body:
    type: json
    data: |-
      {"sessionId":"mw-test-3","scopes":["cart.view"],"expiresIn":3600}

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 401", function() {
          expect(res.status).to.equal(401);
        });

        test("should return missing_signature error", function() {
          expect(res.body.error).to.equal("missing_signature");
        });
