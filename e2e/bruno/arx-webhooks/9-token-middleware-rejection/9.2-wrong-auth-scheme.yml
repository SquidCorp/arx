info:
  name: "9.2 Wrong auth scheme (Bearer instead of DPoP)"
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/resource"

runtime:
  scripts:
    - type: before-request
      code: |-
        req.setHeader('Authorization', 'Bearer some-token');
    - type: tests
      code: |-
        test("should return 401", function() {
          expect(res.status).to.equal(401);
        });

        test("should return missing_token error", function() {
          expect(res.body).to.have.property("error", "missing_token");
        });
