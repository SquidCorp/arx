info:
  name: "9.0 Setup — create session and bind token for middleware tests"
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/token/bind"
  body:
    type: json
    data: |-
      {"bind_code":"placeholder","dpop_proof":"placeholder"}

runtime:
  scripts:
    - type: before-request
      code: |-
        const crypto = require('node:crypto');

        // --- Step 1: Create a session via webhook ---
        const privateKeyHex = bru.getEnvVar('MERCHANT_PRIVATE_KEY');
        const seed = Buffer.from(privateKeyHex, 'hex');
        const pkcs8Prefix = Buffer.from('302e020100300506032b657004220420', 'hex');
        const der = Buffer.concat([pkcs8Prefix, seed]);
        const keyObject = crypto.createPrivateKey({ key: der, format: 'der', type: 'pkcs8' });

        const baseUrl = bru.getEnvVar('baseUrl');
        const sessionBody = JSON.stringify({ sessionId: 'e2e-mw-reject', scopes: ['cart.view', 'cart.edit'], expiresIn: 3600 });
        const webhookUrl = new URL(`${baseUrl}/webhook/session-connected`);
        const webhookPath = webhookUrl.pathname;

        const ts1 = Math.floor(Date.now() / 1000).toString();
        const nonce1 = crypto.randomUUID();
        const msg1 = `POST\n${webhookPath}\n${ts1}\n${nonce1}\n${sessionBody}`;
        const sig1 = crypto.sign(null, Buffer.from(msg1), keyObject).toString('base64');

        const resp = await fetch(webhookUrl.toString(), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Arx-Tenant-ID': bru.getEnvVar('TENANT_ID'),
            'X-Arx-Signature': sig1,
            'X-Arx-Timestamp': ts1,
            'X-Arx-Nonce': nonce1
          },
          body: sessionBody
        });
        const data = await resp.json();
        const bindCode = data.bindCode;

        // --- Step 2: Generate Ed25519 keypair for DPoP ---
        const { publicKey, privateKey } = crypto.generateKeyPairSync('ed25519');
        const pubRaw = publicKey.export({ type: 'spki', format: 'der' });
        const pubBytes = pubRaw.subarray(pubRaw.length - 32);
        const xB64 = pubBytes.toString('base64url');

        // Build DPoP proof JWT for the bind request.
        const header = {
          typ: 'dpop+jwt',
          alg: 'EdDSA',
          jwk: { kty: 'OKP', crv: 'Ed25519', x: xB64 }
        };

        const bindUrl = new URL(`${baseUrl}/token/bind`);
        const payload = {
          jti: crypto.randomUUID(),
          htm: 'POST',
          htu: `${bindUrl.origin}${bindUrl.pathname}`,
          iat: Math.floor(Date.now() / 1000)
        };

        const encHeader = Buffer.from(JSON.stringify(header)).toString('base64url');
        const encPayload = Buffer.from(JSON.stringify(payload)).toString('base64url');
        const sigInput = `${encHeader}.${encPayload}`;
        const dpopSig = crypto.sign(null, Buffer.from(sigInput), privateKey);
        const dpopJwt = `${sigInput}.${dpopSig.toString('base64url')}`;

        req.setBody(JSON.stringify({ bind_code: bindCode, dpop_proof: dpopJwt }));
        req.setHeader('Content-Type', 'application/json');

        // Store keypair for downstream tests.
        bru.setVar('mwDpopPrivateKeyHex', privateKey.export({ type: 'pkcs8', format: 'der' }).toString('hex'));
        bru.setVar('mwDpopPublicX', xB64);

    - type: tests
      code: |-
        test("setup: should bind token successfully", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.have.property("access_token");
          expect(res.body).to.have.property("token_type", "DPoP");
        });

        bru.setVar("mwAccessToken", res.body.access_token);
