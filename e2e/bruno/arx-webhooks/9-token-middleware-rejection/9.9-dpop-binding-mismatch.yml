info:
  name: "9.9 DPoP proof signed with different key than token binding"
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/resource"

runtime:
  scripts:
    - type: before-request
      code: |-
        const crypto = require('node:crypto');

        const token = bru.getVar('mwAccessToken');
        req.setHeader('Authorization', `DPoP ${token}`);

        // Generate a DIFFERENT keypair (not the one bound in the token).
        const { publicKey, privateKey } = crypto.generateKeyPairSync('ed25519');
        const pubRaw = publicKey.export({ type: 'spki', format: 'der' });
        const pubBytes = pubRaw.subarray(pubRaw.length - 32);
        const xB64 = pubBytes.toString('base64url');

        const header = {
          typ: 'dpop+jwt',
          alg: 'EdDSA',
          jwk: { kty: 'OKP', crv: 'Ed25519', x: xB64 }
        };

        const rawUrl = req.getUrl().replace(/\{\{baseUrl\}\}/g, bru.getEnvVar('baseUrl'));
        const url = new URL(rawUrl);

        // Compute ath (SHA-256 of access token).
        const hash = crypto.createHash('sha256').update(token).digest();
        const ath = hash.toString('base64url');

        const payload = {
          jti: crypto.randomUUID(),
          htm: 'GET',
          htu: `${url.origin}${url.pathname}`,
          iat: Math.floor(Date.now() / 1000),
          ath: ath
        };

        const encHeader = Buffer.from(JSON.stringify(header)).toString('base64url');
        const encPayload = Buffer.from(JSON.stringify(payload)).toString('base64url');
        const sigInput = `${encHeader}.${encPayload}`;
        const sig = crypto.sign(null, Buffer.from(sigInput), privateKey);
        const dpopJwt = `${sigInput}.${sig.toString('base64url')}`;

        req.setHeader('DPoP', dpopJwt);
    - type: tests
      code: |-
        test("should return 401", function() {
          expect(res.status).to.equal(401);
        });

        test("should return dpop_binding_mismatch error", function() {
          expect(res.body).to.have.property("error", "dpop_binding_mismatch");
        });
