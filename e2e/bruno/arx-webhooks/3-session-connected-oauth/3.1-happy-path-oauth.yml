info:
  name: "3.1 Happy path — link to pending OAuth flow"
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/webhook/session-connected"
  body:
    type: json
    data: |-
      {"sessionId":"e2e-session-3.1","scopes":["cart.view"],"expiresIn":3600,"uuid":"test-oauth-uuid"}

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 201 Created", function() {
          expect(res.status).to.equal(201);
        });

        test("should return status: pending", function() {
          expect(res.body.status).to.equal("pending");
        });

        test("should NOT return a bindCode (Flow 1 has none)", function() {
          expect(res.body).to.not.have.property("bindCode");
        });
